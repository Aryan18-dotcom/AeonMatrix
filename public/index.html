  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #0f172a 0%, #020617 60%, #000000 100%);
      color: #f8fafc;
    }

    .glass-card {
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(24px);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-card:hover {
      border-color: rgba(99, 102, 241, 0.25);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7);
    }

    .input-field {
      background: rgba(2, 6, 23, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
    }

    .input-field:focus {
      border-color: #6366f1;
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
    }
  </style>

<body class="min-h-screen text-sm antialiased text-slate-200">

  <div id="authGate"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-3xl p-4 transition-all duration-500">
    <div class="w-full max-w-md p-6 sm:p-8 glass-card rounded-3xl animate__animated animate__fadeInUp shadow-2xl">
      <div class="text-center mb-6">
        <div
          class="h-12 w-12 rounded-2xl bg-indigo-500/10 border border-indigo-500/30 flex items-center justify-center mx-auto mb-3 shadow-lg shadow-indigo-500/20">
          <span class="h-3 w-3 rounded-full bg-indigo-400 animate-ping"></span>
        </div>
        <h2 class="text-2xl font-bold tracking-tight text-white">Hermes System Gateway</h2>
        <p class="text-xs text-slate-400 mt-1">Provide secure access credentials to interface with loops</p>
      </div>
      <form id="authForm" class="space-y-4">
        <div>
          <label class="text-[11px] font-mono uppercase tracking-wider text-slate-400 block mb-1">User
            Identifier</label>
          <input id="authUsername" type="text" required
            class="w-full input-field rounded-xl px-4 py-3 text-xs text-white outline-none"
            placeholder="Username (Admin / Trial)" />
        </div>
        <div>
          <label class="text-[11px] font-mono uppercase tracking-wider text-slate-400 block mb-1">Access Token
            Pin</label>
          <input id="authPassword" type="password" required
            class="w-full input-field rounded-xl px-4 py-3 text-xs text-white outline-none" placeholder="••••••••" />
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl text-xs tracking-wider uppercase transition shadow-lg shadow-indigo-600/30">
          Authorize Session Access
        </button>
        <div id="authError" class="text-xs text-rose-400 text-center font-mono mt-2 min-h-[16px]"></div>
      </form>
    </div>
  </div>

  <div id="appContainer" class="hidden max-w-7xl mx-auto p-4 md:p-8 animate__animated animate__fadeIn">

    <header
      class="flex flex-col lg:flex-row items-start lg:items-center justify-between gap-4 mb-8 border-b border-slate-800/60 pb-6">
      <div>
        <h1 class="text-xl sm:text-2xl font-bold tracking-tight flex items-center gap-2">
          <span class="h-3 w-3 rounded-full bg-indigo-500 shadow-md shadow-indigo-500"></span>
          Hermes AI Automation Control Plane
        </h1>
        <div class="flex flex-wrap items-center gap-2 mt-1.5">
          <span id="roleBadge"
            class="text-[10px] font-mono uppercase tracking-widest px-2.5 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">Scope:
            ADMIN</span>
          <span id="jobLimitIndicator"
            class="text-[10px] font-mono uppercase px-2.5 py-0.5 rounded-full bg-indigo-500/5 text-indigo-300 border border-indigo-500/10 tracking-wider">Metrics:
            --</span>
        </div>
      </div>

      <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 w-full lg:w-auto">
        <!-- High-Precision Telemetry System Clock -->
        <div
          class="glass-card px-4 py-2.5 rounded-xl flex items-center justify-center gap-3 border border-slate-800/80 font-mono text-xs shadow-inner">
          <span class="flex h-2 w-2 relative">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
          </span>
          <span id="systemClock" class="text-slate-300 tracking-wider">00:00:00 AM | 00/00/2026</span>
        </div>

        <div class="flex items-center gap-2 w-full sm:w-auto">
          <!-- Upgraded Interactive Radar Alarm Toggle -->
          <button id="alarmToggle"
            class="flex-1 sm:flex-initial flex items-center justify-center gap-2.5 text-xs font-mono px-4 py-2.5 rounded-xl border transition-all duration-300 relative overflow-hidden group">
            <span class="flex h-2 w-2 relative">
              <span id="alarmPulse" class=""></span>
              <span id="alarmDot" class="relative inline-flex rounded-full h-2 w-2"></span>
            </span>
            <span id="alarmLabel" class="tracking-wider font-bold">Alert Network: ACTIVE</span>
          </button>

          <button id="configBtn"
            class="text-xs font-mono px-4 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white transition shadow-lg shadow-indigo-600/20">Matrix
            Setup ⚙</button>
          <button id="logoutBtn"
            class="text-xs font-mono px-3 py-2.5 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition">Exit</button>
        </div>
      </div>
    </header>

    <main class="grid lg:grid-cols-3 gap-6">

      <section class="glass-card rounded-3xl p-5 sm:p-6 shadow-xl flex flex-col justify-between h-fit">
        <form id="promptForm" class="space-y-4">
          <div class="flex justify-between items-center">
            <label class="text-xs font-bold font-mono uppercase tracking-wider text-slate-400">Structural Natural Prompt
              Input</label>
          </div>
          <textarea id="promptInput" rows="7" required
            class="w-full input-field rounded-2xl p-4 text-xs text-slate-100 outline-none resize-none"
            placeholder="Describe your automation pipeline logic here. For example: 'Every 5 minutes track updates matching my resume and report back to Telegram'"></textarea>
          <button id="submitBtn"
            class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition shadow-xl shadow-indigo-600/30">
            Compile & Inject Rule Map
          </button>
        </form>
        <div id="statusBox"
          class="mt-4 text-[11px] font-mono p-4 bg-slate-950/80 border border-slate-900 rounded-2xl min-h-[100px] max-h-[160px] overflow-y-auto text-slate-400 leading-relaxed select-all">
          System Core idling. Awaiting instruction mapping vectors...</div>
      </section>

      <section class="lg:col-span-2 glass-card rounded-3xl p-5 sm:p-6 shadow-xl flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800/50 pb-4">
          <h2 class="text-xs font-bold font-mono tracking-widest uppercase text-slate-400">Live Orchestration Thread
            Pool</h2>
          <button id="refreshBtn"
            class="text-xs font-mono px-3 py-1 rounded-lg bg-slate-900 border border-slate-800 text-slate-300 hover:text-white transition">Refresh
            Pool State</button>
        </div>
        <div id="jobsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto pr-1"></div>
      </section>

    </main>
  </div>

  <div id="configOverlay"
    class="fixed inset-0 bg-black/80 backdrop-blur-xl flex items-center justify-center opacity-0 pointer-events-none transition-all duration-300 z-40 p-4">
    <div
      class="glass-card max-w-2xl w-full rounded-3xl border border-slate-800 p-5 sm:p-6 max-h-[90vh] overflow-y-auto animate__animated">
      <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-3">
        <h3 class="text-sm font-bold font-mono uppercase tracking-wider text-indigo-400">System Integration
          Configuration Map</h3>
        <button id="configClose" class="text-slate-400 hover:text-white text-lg">✕</button>
      </div>
      <form id="configForm" class="space-y-4">
        <div class="grid md:grid-cols-2 gap-4">
          <div class="bg-slate-950/60 p-4 rounded-xl border border-slate-900 space-y-3">
            <label class="text-xs font-bold font-mono uppercase tracking-wider text-indigo-300 block">Telegram
              Credentials Gateway</label>
            <div>
              <label class="text-[10px] text-slate-400 block mb-1 font-mono">BOT ACCESS TOKEN</label>
              <input id="cfgTelegramBotToken" type="text"
                class="w-full input-field rounded-lg px-3 py-2 text-xs text-white outline-none"
                placeholder="Bot Access Token Key" />
            </div>
            <div>
              <label class="text-[10px] text-slate-400 block mb-1 font-mono">OWNER CHAT ID</label>
              <input id="cfgTelegramOwnerId" type="text"
                class="w-full input-field rounded-lg px-3 py-2 text-xs text-white outline-none"
                placeholder="Numeric Owner Chat ID" />
            </div>
            <div>
              <label class="text-[10px] text-slate-400 block mb-1 font-mono">ALLOWED USER IDS (COMMA SEPARATED)</label>
              <input id="cfgTelegramAllowedIds" type="text"
                class="w-full input-field rounded-lg px-3 py-2 text-xs text-white outline-none"
                placeholder="e.g. 11223344, 55667788" />
            </div>
          </div>
          <div class="bg-slate-950/60 p-4 rounded-xl border border-slate-900 flex flex-col justify-between gap-4">
            <div>
              <label class="text-xs font-bold font-mono uppercase tracking-wider text-indigo-300 block mb-2">SMTP
                Outbound Fallback Email</label>
              <input id="cfgEmail" type="email"
                class="w-full input-field rounded-lg px-3 py-2 text-xs text-white outline-none"
                placeholder="alerts@domain.com" />
            </div>
            <div>
              <label class="text-[10px] text-slate-400 block mb-1 font-mono">DEFAULT DELIVERY MEDIUM</label>
              <select id="cfgDefaultMedium"
                class="w-full input-field rounded-lg px-3 py-2 text-xs text-slate-300 outline-none">
                <option value="site">Local UI Log Panel Only</option>
                <option value="telegram">Telegram Bot Sync Vector</option>
                <option value="email">Outgoing Secured SMTP Client</option>
              </select>
            </div>
          </div>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-300 block mb-1">Personal Knowledge Graph Vector (Resume Profile
            Context)</label>
          <textarea id="cfgResume" rows="5"
            class="w-full input-field rounded-xl p-3 text-xs text-slate-300 outline-none font-mono"
            placeholder="Paste data logs or profile layouts here for web search agent filtering loops..."></textarea>
        </div>
        <div class="flex justify-end gap-2 pt-4 border-t border-slate-800">
          <button type="button" id="configCancel"
            class="text-xs font-mono px-4 py-2 rounded-xl bg-slate-900 border border-slate-800 text-slate-400 hover:text-white transition">Cancel</button>
          <button type="submit"
            class="text-xs font-mono px-4 py-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white transition shadow-lg shadow-indigo-600/20">Commit
            Mapping Changes</button>
        </div>
      </form>
      <div id="configStatus" class="mt-3 text-xs text-center font-mono tracking-wide"></div>
    </div>
  </div>

  <script>
    let SESSION_USER = localStorage.getItem('hermes_user') || null;
    let SESSION_ROLE = localStorage.getItem('hermes_role') || null;
    let notificationsEnabled = true;
    let globalJobsCache = [];

    const notificationAudio = new Audio('/sound_way.mp3');

    const authGate = document.getElementById('authGate');
    const authForm = document.getElementById('authForm');
    const authUsername = document.getElementById('authUsername');
    const authPassword = document.getElementById('authPassword');
    const authError = document.getElementById('authError');
    const appContainer = document.getElementById('appContainer');
    const roleBadge = document.getElementById('roleBadge');
    const systemClock = document.getElementById('systemClock');
    const jobLimitIndicator = document.getElementById('jobLimitIndicator');
    const configBtn = document.getElementById('configBtn');
    const configOverlay = document.getElementById('configOverlay');
    const configClose = document.getElementById('configClose');
    const configCancel = document.getElementById('configCancel');
    const configForm = document.getElementById('configForm');
    const configStatus = document.getElementById('configStatus');
    const promptForm = document.getElementById('promptForm');
    const promptInput = document.getElementById('promptInput');
    const submitBtn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');
    const jobsContainer = document.getElementById('jobsContainer');
    const refreshBtn = document.getElementById('refreshBtn');

    const alarmToggle = document.getElementById('alarmToggle');
    const alarmPulse = document.getElementById('alarmPulse');
    const alarmDot = document.getElementById('alarmDot');
    const alarmLabel = document.getElementById('alarmLabel');

    // High-Precision Telemetry Clock Loop Sync Pass
    function updateSystemClock() {
      const timeStr = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const dateStr = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
      systemClock.textContent = `${timeStr} | ${dateStr}`;
    }
    setInterval(updateSystemClock, 1000);
    updateSystemClock();

    // Upgraded Alarm Interface Color Mapping Framework
    function syncAlarmUI() {
      if (notificationsEnabled) {
        alarmToggle.className = "flex-1 sm:flex-initial flex items-center justify-center gap-2.5 text-xs font-mono px-4 py-2.5 rounded-xl bg-emerald-500/10 text-emerald-400 border border-emerald-500/30 hover:bg-emerald-500/20 transition-all duration-300 shadow-lg shadow-emerald-500/5";
        alarmPulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
        alarmDot.className = "relative inline-flex rounded-full h-2 w-2 bg-emerald-500";
        alarmLabel.textContent = "Alert Network: ACTIVE";
      } else {
        alarmToggle.className = "flex-1 sm:flex-initial flex items-center justify-center gap-2.5 text-xs font-mono px-4 py-2.5 rounded-xl bg-rose-500/10 text-rose-400 border border-rose-500/20 hover:bg-rose-500/20 transition-all duration-300 shadow-none";
        alarmPulse.className = "hidden";
        alarmDot.className = "relative inline-flex rounded-full h-2 w-2 bg-rose-500 shadow-md shadow-rose-500";
        alarmLabel.textContent = "Alert Network: MUTED";
      }
    }

    function checkSessionRouteState() {
      if (SESSION_USER && SESSION_ROLE) {
        authGate.classList.add('opacity-0', 'pointer-events-none');
        appContainer.classList.remove('hidden');
        roleBadge.textContent = `Scope: ${SESSION_ROLE.toUpperCase()}`;

        if (SESSION_ROLE === 'trial') {
          configBtn.classList.add('hidden');
          roleBadge.className = 'text-[10px] font-mono uppercase tracking-widest px-2.5 py-0.5 rounded-full bg-amber-500/10 text-amber-400 border border-amber-500/20';
          submitBtn.className = 'w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition shadow-xl shadow-amber-600/30';
        } else {
          configBtn.classList.remove('hidden');
          roleBadge.className = 'text-[10px] font-mono uppercase tracking-widest px-2.5 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20';
          submitBtn.className = 'w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl text-xs uppercase tracking-wider transition shadow-xl shadow-indigo-600/30';
        }

        syncAlarmUI();
        fetchJobs();
        if (SESSION_ROLE === 'admin') loadConfig();
      } else {
        authGate.classList.remove('opacity-0', 'pointer-events-none');
        appContainer.classList.add('hidden');
      }
    }

    authForm.addEventListener('submit', async e => {
      e.preventDefault();
      authError.textContent = '';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: authUsername.value.trim(), password: authPassword.value })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          SESSION_USER = data.username;
          SESSION_ROLE = data.role;
          localStorage.setItem('hermes_user', SESSION_USER);
          localStorage.setItem('hermes_role', SESSION_ROLE);
          authUsername.value = '';
          authPassword.value = '';
          checkSessionRouteState();
        } else {
          authError.textContent = data.error || 'Authentication parameters denied.';
        }
      } catch {
        authError.textContent = 'Network communication interface fault.';
      }
    });

    logoutBtn.addEventListener('click', () => {
      localStorage.clear();
      SESSION_USER = null;
      SESSION_ROLE = null;
      checkSessionRouteState();
    });

    configBtn.addEventListener('click', () => {
      configOverlay.classList.remove('opacity-0', 'pointer-events-none');
      configOverlay.firstElementChild.className = 'glass-card max-w-2xl w-full mx-4 rounded-3xl border border-slate-800 p-6 max-h-[90vh] overflow-y-auto animate__animated animate__zoomIn';
    });

    function closeOverlay() {
      configOverlay.classList.add('opacity-0', 'pointer-events-none');
    }
    configClose.addEventListener('click', closeOverlay);
    configCancel.addEventListener('click', closeOverlay);

    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        if (res.ok) {
          const cfg = await res.json();
          document.getElementById('cfgTelegramBotToken').value = cfg.telegramBotToken || '';
          document.getElementById('cfgTelegramOwnerId').value = cfg.telegramOwnerId || '';
          document.getElementById('cfgTelegramAllowedIds').value = cfg.telegramAllowedIds || '';
          document.getElementById('cfgEmail').value = cfg.email || '';
          document.getElementById('cfgDefaultMedium').value = cfg.defaultMedium || 'site';
          document.getElementById('cfgResume').value = cfg.userResume || '';
        }
      } catch { }
    }

    configForm.addEventListener('submit', async e => {
      e.preventDefault();
      configStatus.className = 'mt-3 text-xs text-center font-mono text-slate-400';
      configStatus.textContent = 'Syncing keys securely inside system cluster registry...';
      const payload = {
        telegramBotToken: document.getElementById('cfgTelegramBotToken').value,
        telegramOwnerId: document.getElementById('cfgTelegramOwnerId').value.trim(),
        telegramAllowedIds: document.getElementById('cfgTelegramAllowedIds').value.trim(),
        email: document.getElementById('cfgEmail').value.trim(),
        defaultMedium: document.getElementById('cfgDefaultMedium').value,
        userResume: document.getElementById('cfgResume').value.trim()
      };
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          configStatus.className = 'mt-3 text-xs text-center font-mono text-emerald-400';
          configStatus.textContent = '✅ Configurations written and active.';
          setTimeout(closeOverlay, 1000);
        } else { configStatus.textContent = '❌ Scope rejected changes.'; }
      } catch { configStatus.textContent = '❌ Target communication exception.'; }
    });

    async function fetchJobs() {
      if (!SESSION_USER) return;
      try {
        const res = await fetch(`/api/jobs?user=${SESSION_USER}`);
        const jobs = await res.json();

        // Multi-Tenant Real-time Metric Badge Sync Block
        if (SESSION_ROLE === 'trial') {
          const slotsLeft = Math.max(0, 3 - jobs.length);
          jobLimitIndicator.className = 'text-[10px] font-mono uppercase bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-0.5 rounded-full tracking-wider';
          jobLimitIndicator.textContent = `Slots Left: ${slotsLeft} / 3`;
        } else {
          jobLimitIndicator.className = 'text-[10px] font-mono uppercase bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 px-2.5 py-0.5 rounded-full tracking-wider';
          jobLimitIndicator.textContent = `Active Loop Pools: ${jobs.length}`;
        }

        if (notificationsEnabled && globalJobsCache.length > 0) {
          // 1. Check for updates on existing or changing jobs
          globalJobsCache.forEach(previous => {
            const currentJob = jobs.find(j => j.id === previous.id);
            let clearTriggerDetected = false;
            let triggerTarget = previous;

            // Scenario A: The job ran, completed, and was cleared from the server array completely
            if (!currentJob && previous.status === 'active') {
              clearTriggerDetected = true;
            }
            // Scenario B: The job is still active, but has generated a fresh execution log entry
            else if (currentJob && currentJob.logs && currentJob.logs.length > 0) {
              const hasNewLog = !previous.logs ||
                previous.logs.length === 0 ||
                previous.logs.length !== currentJob.logs.length ||
                previous.logs[0].timestamp !== currentJob.logs[0].timestamp;

              if (hasNewLog) {
                clearTriggerDetected = true;
                triggerTarget = currentJob;
              }
            }

            if (clearTriggerDetected) {
              console.log(`[🔔 NOTIFICATION MATRIX] Target match detected on thread: ${triggerTarget.name}`);

              // Reset and ready the notification audio track
              notificationAudio.muted = false;
              notificationAudio.currentTime = 0;

              const playAudio = () => {
                const playPromise = notificationAudio.play();
                if (playPromise !== undefined) {
                  playPromise.catch(e => console.warn('⚠️ Audio play blocked by browser interaction rules:', e.message));
                }
              };

              // Leverage the system notification window if access has been granted
              if ('Notification' in window && Notification.permission === 'granted') {
                const notification = new Notification(`🔔 AeonMatrix Match [${triggerTarget.name}]`, {
                  body: triggerTarget.description || triggerTarget.task,
                  icon: '/favicon.ico'
                });

                notification.onshow = playAudio;
              } else {
                // Persistent tab fallback execution pass if minimized or default permission state is active
                playAudio();
              }
            }
          });
        }
        globalJobsCache = jobs;
        renderJobsMatrixList(jobs);
      } catch (err) {
        console.error('❌ Front-end telemetry fetch error:', err.message);
      }
    }

    function renderJobsMatrixList(jobs) {
      if (jobs.length === 0) {
        jobsContainer.innerHTML = `<div class="col-span-full text-center py-20 text-xs font-mono text-slate-500 animate__animated animate__fadeIn">No computational threads active in current pool context.</div>`;
        return;
      }
      jobsContainer.innerHTML = jobs.map(job => {
        const isPaused = job.status === 'paused';
        return `
          <div class="p-5 rounded-2xl glass-card bg-slate-950/20 border ${isPaused ? 'border-dashed border-slate-800 opacity-40' : 'border-slate-800/80'} flex flex-col justify-between shadow-lg animate__animated animate__fadeIn">
            <div>
              <div class="flex justify-between items-start gap-2 mb-3">
                <div class="truncate">
                  <h4 class="text-xs font-bold font-mono text-slate-200 truncate">${job.name}</h4>
                  <span class="text-[10px] font-mono text-slate-500 block truncate mt-0.5">${job.description}</span>
                </div>
                <span class="text-[9px] font-mono px-2 py-0.5 rounded uppercase ${job.isOneOff ? 'bg-amber-500/10 text-amber-400' : 'bg-indigo-500/10 text-indigo-400'} shrink-0">${job.isOneOff ? 'Transient' : 'Loop'}</span>
              </div>
              <div class="text-[10px] font-mono text-emerald-400 bg-slate-950/90 border border-slate-900 rounded-lg px-2.5 py-1.5 mb-3 flex items-center justify-between tracking-wide gap-2">
                <span class="truncate">⏱ ${job.schedule}</span>
                <span class="text-[9px] text-slate-500 shrink-0">Route: ${job.deliveryMedium}</span>
              </div>
              <div class="bg-black/40 border border-slate-900 rounded-xl p-3 h-28 overflow-y-auto text-[11px] font-mono text-slate-300 leading-relaxed">
                ${job.logs?.length > 0 ? job.logs.map(l => `<div class="mb-1.5"><span class="text-indigo-400 font-bold">[${l.timestamp}]</span> ${l.message}</div>`).join('') : '<span class="text-slate-600 italic">No output execution logs written yet...</span>'}
              </div>
            </div>
            <div class="flex justify-between items-center pt-3 mt-4 border-t border-slate-900/60 text-[11px] font-mono">
              <button onclick="togglePause('${job.id}')" class="${isPaused ? 'text-emerald-400' : 'text-amber-500'} hover:underline">${isPaused ? '▶ Start' : '⏸ Pause'}</button>
              <button onclick="deleteJob('${job.id}')" class="text-rose-400 hover:underline">Purge Thread</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function togglePause(id) {
      await fetch('/api/jobs/toggle-pause', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
      fetchJobs();
    }

    async function deleteJob(id) {
      if (confirm('Permanently wipe this tracking routine entry loop?')) {
        await fetch(`/api/jobs?id=${id}`, { method: 'DELETE' });
        fetchJobs();
      }
    }
    window.togglePause = togglePause;
    window.deleteJob = deleteJob;

    // Automatically submit prompt on Enter key layout passes
    promptInput.addEventListener('keydown', e => {
      // Catch 'Enter' key hits strictly while preventing intercept blocks on 'Shift + Enter' splits
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault(); // Stop the default textarea raw new-line trailing insertion
        promptForm.requestSubmit(); // Safely trigger the validation routines on the parent form plane
      }
    });

    promptForm.addEventListener('submit', async e => {
      e.preventDefault();
      const prompt = promptInput.value.trim();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Compiling Rule Vector Matrix...';
      statusBox.textContent = '⚙️ Analyzing token layouts via NaraRouter model maps... Evaluating structural parameters...';

      try {
        const res = await fetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, user: SESSION_USER })
        });
        const data = await res.json();
        if (res.ok && data.success) {
          statusBox.textContent = `✅ Automation loop compiled and bound successfully into application state vectors.\nAssigned Cron Target Identity: ${data.job.schedule}`;
          promptInput.value = '';
          fetchJobs();
        } else {
          statusBox.textContent = `❌ Rejection: ${data.error || 'Syntax exception.'}`;
        }
      } catch {
        statusBox.textContent = '❌ System platform interaction timeout exception.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Compile & Inject Rule Map';
      }
    });

    refreshBtn.addEventListener('click', fetchJobs);

    alarmToggle.addEventListener('click', async () => {
      notificationsEnabled = !notificationsEnabled;
      syncAlarmUI();

      if (notificationsEnabled) {
        if ('Notification' in window) {
          await Notification.requestPermission().catch(() => { });
        }
        try {
          notificationAudio.play().then(() => {
            notificationAudio.pause();
            notificationAudio.currentTime = 0;
          });
        } catch (e) {
          console.warn('[UI Prime Sync Error]', e);
        }
      }
    });

    checkSessionRouteState();
    setInterval(fetchJobs, 4000);
  </script>
</body>

</html>
